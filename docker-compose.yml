services:
  postgres:
    image: postgres:16
    container_name: webhook-pipeline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_pipeline
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: webhook-pipeline-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: webhook-pipeline-app
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/webhook_pipeline?schema=public&sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data: